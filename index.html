<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SLN Equipments</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: system-ui, sans-serif; background: #f8fafc; }
  
  .popup-overlay {
    display: none;
    position: fixed; inset: 0; z-index: 9999;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(4px);
    align-items: center; justify-content: center;
    padding: 16px;
  }
  .popup-overlay.active { display: flex; }
  
  .popup {
    background: #fff; border-radius: 16px;
    max-width: 420px; width: 100%; max-height: 90vh;
    overflow-y: auto; box-shadow: 0 25px 50px rgba(0,0,0,0.25);
  }
  
  .popup-header {
    background: linear-gradient(135deg, #f97316, #ea580c);
    color: #fff; padding: 20px; border-radius: 16px 16px 0 0;
    display: flex; justify-content: space-between; align-items: center;
  }
  .popup-header h2 { font-size: 20px; font-weight: 700; }
  .popup-header p { font-size: 13px; color: #fed7aa; margin-top: 2px; }
  .close-btn { font-size: 28px; color: rgba(255,255,255,0.8); cursor: pointer; background: none; border: none; }
  
  .popup-body { padding: 20px; }
  .form-group { margin-bottom: 16px; }
  .form-group label { font-size: 14px; font-weight: 500; color: #374151; display: block; margin-bottom: 6px; }
  .form-group input, .form-group textarea, .form-group select {
    width: 100%; padding: 10px 12px; border: 1px solid #d1d5db;
    border-radius: 8px; font-size: 14px; outline: none;
  }
  .form-group input:focus, .form-group textarea:focus { border-color: #f97316; box-shadow: 0 0 0 2px rgba(249,115,22,0.2); }
  
  .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; max-height: 200px; overflow-y: auto; }
  .product-btn {
    display: flex; align-items: center; gap: 8px; padding: 8px;
    border: 1px solid #e5e7eb; border-radius: 8px; cursor: pointer;
    background: #fff; text-align: left; transition: all 0.2s;
  }
  .product-btn:hover { border-color: #fb923c; }
  .product-btn.selected { border-color: #f97316; background: #fff7ed; box-shadow: 0 0 0 2px rgba(249,115,22,0.2); }
  .product-btn img { width: 40px; height: 40px; border-radius: 6px; object-fit: cover; flex-shrink: 0; }
  .product-btn .placeholder { width: 40px; height: 40px; border-radius: 6px; background: #f3f4f6; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  .product-btn span { font-size: 12px; font-weight: 500; color: #374151; }
  
  .submit-btn {
    width: 100%; background: linear-gradient(135deg, #f97316, #ea580c);
    color: #fff; font-weight: 600; padding: 12px; border: none;
    border-radius: 8px; cursor: pointer; font-size: 15px;
  }
  .submit-btn:hover { opacity: 0.9; }
  .submit-btn:disabled { opacity: 0.5; }
  
  .success-msg { text-align: center; padding: 40px 20px; }
  .success-msg .check { font-size: 48px; }
  .success-msg h3 { font-size: 18px; font-weight: 700; color: #111827; margin-top: 12px; }
  .success-msg p { font-size: 14px; color: #6b7280; margin-top: 4px; }
  
  .note { font-size: 12px; text-align: center; color: #9ca3af; margin-top: 8px; }
</style>
</head>
<body>

<div class="popup-overlay" id="popup">
  <div class="popup">
    <div class="popup-header">
      <div>
        <h2>Get a Free Quote!</h2>
        <p>SLN Equipments — Commercial Kitchen Solutions</p>
      </div>
      <button class="close-btn" onclick="closePopup()">&times;</button>
    </div>
    <div class="popup-body" id="formBody">
      <form id="leadForm">
        <div class="form-group">
          <label>Full Name *</label>
          <input type="text" id="name" required placeholder="Your name">
        </div>
        <div class="form-group">
          <label>Phone *</label>
          <input type="tel" id="phone" required placeholder="+91-XXXXXXXXXX">
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="email" placeholder="you@example.com">
        </div>
        <div class="form-group">
          <label>Product Interested</label>
          <div class="product-grid" id="productGrid"></div>
        </div>
        <div class="form-group">
          <label>Requirements</label>
          <textarea id="requirements" rows="2" placeholder="Tell us what you need..."></textarea>
        </div>
        <button type="submit" class="submit-btn" id="submitBtn">Submit Request</button>
        <p class="note">We'll contact you within 24 hours</p>
      </form>
    </div>
    <div class="popup-body" id="successBody" style="display:none;">
      <div class="success-msg">
        <div class="check">✅</div>
        <h3>Thank you!</h3>
        <p>We'll get back to you shortly with a quotation.</p>
      </div>
    </div>
  </div>
</div>

<script>
const PRODUCTS = [
  { name: "6-Burner Gas Range with Oven", image: "https://drive.google.com/thumbnail?id=1-6miFI3nh6CO-gLmxyh4ppnDrYQT7SHy&sz=w1000" },
  { name: "Single Burner Commercial Gas Range", image: "https://drive.google.com/thumbnail?id=17jOHngOTdqxnvgRwuZoxUsbDjw8s5m4F&sz=w1000" },
  { name: "Shawarma Machine", image: "" },
  { name: "Rice Vessel", image: "" },
  { name: "Flat Grill / Tawa", image: "" },
  { name: "Two Burner", image: "" },
  { name: "Single Sink Unit", image: "" },
  { name: "Two Sink Unit", image: "" },
  { name: "Three Sink Unit", image: "" },
  { name: "Commercial Dishwasher", image: "" },
  { name: "Work Table", image: "" },
  { name: "Display Counter", image: "" },
  { name: "Bain Marie", image: "" },
  { name: "Exhaust Hood", image: "" },
  { name: "Gas Line", image: "" },
  { name: "Custom / Multiple", image: "" },
];

let selectedProduct = "";

// Build product grid
const grid = document.getElementById("productGrid");
PRODUCTS.forEach(p => {
  const btn = document.createElement("button");
  btn.type = "button";
  btn.className = "product-btn";
  btn.onclick = () => {
    document.querySelectorAll(".product-btn").forEach(b => b.classList.remove("selected"));
    btn.classList.add("selected");
    selectedProduct = p.name;
  };
  if (p.image) {
    btn.innerHTML = `<img src="${p.image}" alt="${p.name}"><span>${p.name}</span>`;
  } else {
    btn.innerHTML = `<div class="placeholder">📦</div><span>${p.name}</span>`;
  }
  grid.appendChild(btn);
});

// Show popup after 10 seconds (only once per visitor)
if (!localStorage.getItem("lead_popup_seen")) {
  setTimeout(() => {
    document.getElementById("popup").classList.add("active");
  }, 10000);
}

function closePopup() {
  document.getElementById("popup").classList.remove("active");
  localStorage.setItem("lead_popup_seen", "true");
}

// Handle form submit
document.getElementById("leadForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const btn = document.getElementById("submitBtn");
  btn.disabled = true;
  btn.textContent = "Submitting...";

  const data = {
    name: document.getElementById("name").value,
    phone: document.getElementById("phone").value,
    email: document.getElementById("email").value,
    product_interested: selectedProduct,
    requirements: document.getElementById("requirements").value,
    status: "new",
  };

  // Submit to Supabase
  try {
    const res = await fetch("https://pvymfafulsurpggfpmrp.supabase.co/rest/v1/leads", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "apikey": "YOUR_SUPABASE_ANON_KEY", // ← Replace with your anon key
        "Authorization": "Bearer YOUR_SUPABASE_ANON_KEY", // ← Replace with your anon key
      },
      body: JSON.stringify(data),
    });

    if (!res.ok) throw new Error("Failed");
    
    document.getElementById("formBody").style.display = "none";
    document.getElementById("successBody").style.display = "block";
    setTimeout(() => closePopup(), 2500);
  } catch (err) {
    alert("Something went wrong. Please call us instead!");
    btn.disabled = false;
    btn.textContent = "Submit Request";
  }
});
</script>
</body>
</html>
